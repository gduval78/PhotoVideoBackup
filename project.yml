# XcodeGen project spec — générez le .xcodeproj avec : xcodegen generate
# Installation xcodegen : brew install xcodegen

name: PhotoVideoBackup

options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"
  ALWAYS_SEARCH_USER_PATHS: NO
  CLANG_ENABLE_OBJC_ARC: YES

targets:
  PhotoVideoBackup:
    type: application
    platform: iOS
    sources:
      - path: PhotoVideoBackup
        excludes:
          - "**/*.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: gduvalsc.PhotoVideoBackupIOS
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      CODE_SIGN_ENTITLEMENTS: PhotoVideoBackup/Resources/PhotoVideoBackup.entitlements
      INFOPLIST_FILE: PhotoVideoBackup/Resources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      TARGETED_DEVICE_FAMILY: "1"
      SWIFT_STRICT_CONCURRENCY: complete
      INFOPLIST_KEY_CFBundleDisplayName: PhotoVideoBackup
    dependencies:
      - sdk: Photos.framework
      - sdk: CryptoKit.framework
      - sdk: StoreKit.framework
    scheme:
      testTargets: []
